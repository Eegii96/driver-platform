<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ДрайверМон - Ажлын зар</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
    <span class="logo">ДрайверМон</span>
    <div class="nav-links">
        <a href="index.html" class="nav-link">Нэвтрэх</a>
        <a href="jobs.html" class="nav-link">Ажлын зар</a>
        <a href="profile.html" class="nav-link">Профайл</a>
        <a href="register.html" class="nav-button-link">Бүртгүүлэх</a>
    </div>
</nav>
    <div class="jobs-container">
        <div class="jobs-header">
            <h2>Ажлын зарууд</h2>
            <button class="dan-button" style="width:200px; height:44px;">+ Зар нэмэх</button>
        </div>
        <div class="job-list">
            <div class="job-item">
                <div class="job-info">
                    <h3>Том ачааны машины жолооч</h3>
                    <p>Дөрвөн гар ХХК</p>
                    <p class="info">📍 Улаанбаатар | 💰 2,500,000₮/сар | 🚛 Камаз</p>
                </div>
                <div class="job-rating">
                    <span class="good-rating">⭐ 4.8</span>
                    <button class="apply-btn">Өргөдөл гаргах</button>
                </div>
            </div>
            <div class="job-item">
                <div class="job-info">
                    <h3>Экскаватор операторч</h3>
                    <p>Монгол Ачаа ХХК</p>
                    <p class="info">📍 Дархан | 💰 3,000,000₮/сар | 🚜 Экскаватор</p>
                </div>
                <div class="job-rating">
                    <span class="good-rating">⭐ 4.5</span>
                    <button class="apply-btn">Өргөдөл гаргах</button>
                </div>
            </div>
        </div>
    </div>
<script type="module" src="script.js"></script>
</body>
</html>
