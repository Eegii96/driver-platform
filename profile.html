<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">

    <title>ДрайверМон - Профайл</title>
    <link rel="stylesheet" href="style.css">

<body>
    <nav class="navbar">
    <span class="logo">ДрайверМон</span>
    <div class="nav-links">

    <div class="profile-container">
